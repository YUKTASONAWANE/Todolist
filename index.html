<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="todo-app">
    <section class="todo-card">
      <h1>Todo List</h1>
      <form id="todo-form" class="todo-form">
        <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off" />
        <button type="submit">Add</button>
      </form>
      <div class="todo-controls">
        <div class="stats">
          <span id="todo-count">0 tasks</span>
        </div>
        <div class="filters">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="active">Active</button>
          <button type="button" class="filter-btn" data-filter="completed">Completed</button>
        </div>
      </div>
      <ul id="todo-list" class="todo-list"></ul>
      <div class="todo-footer">
        <button id="clear-completed" class="clear-btn">Clear Completed</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
